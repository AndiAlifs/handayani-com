<div class="dashboard-page">
  <header class="page-header">
    <div>
      <h1 class="page-title">Mekanisme SIM</h1>
      <p class="page-subtitle">Kelola langkah dan biaya pembuatan SIM A & C</p>
    </div>
    <div class="header-actions">
      <button class="btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Tambah Langkah Baru</span>
      </button>
    </div>
  </header>

  <div class="data-table-container glass-card">
    <div class="table-responsive">
      <table class="data-table">
        <thead>
          <tr>
            <th>Urutan</th>
            <th>Persyaratan</th>
            <th>Instansi Terkait</th>
            <th>Biaya</th>
            <th>Keterangan</th>
            <th class="text-right">Aksi</th>
          </tr>
        </thead>
        <tbody>
          @for (mech of mechanisms; track mech.id; let i = $index) {
            <tr>
              <td>
                <span class="step-badge">{{ i + 1 }}</span>
              </td>
              <td class="font-medium">{{ mech.requirementName }}</td>
              <td>{{ mech.issuingBody }}</td>
              <td>
                <span class="price-badge" [class.free]="mech.cost === 0">{{ formatPrice(mech.cost) }}</span>
              </td>
              <td class="text-muted">{{ mech.notes || '-' }}</td>
              <td class="actions-cell text-right">
                <button class="btn-icon edit" aria-label="Edit">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="btn-icon delete" aria-label="Hapus">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
