# One-shot stack for YPA Handayani.
#
#   docker compose up --build
#
# Brings up four services on one network:
#   db          MySQL 8 — single `handayani` database shared by both backends.
#               FastAPI owns courses/mechanisms/students_crm/sessions (loaded from
#               schema.sql + seed.sql on first boot). The Go service auto-migrates
#               and seeds its own tables (users, attendances, students, ...).
#   attendance  NYAMPE Go backend (auth + attendance), :8090. Issues the JWT.
#   api         FastAPI gateway + CRM/Sessions/RAG, published on host :8080.
#               Validates the Go-issued JWT (shared JWT_SECRET) and proxies
#               /api/auth|attendance|admin|instructor to `attendance`.
#   web         Angular SPA built and served by nginx, published on host :4200.
#
# The browser talks to the API on http://localhost:8080 (baked into the Angular
# build) and to the SPA on http://localhost:4200.
#
# Optional: export GEMINI_API_KEY=... before `up` to enable real Gemini 2.5
# session analysis; leave it unset to use the deterministic stub.

services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: handayani
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      # Loaded once, in alphabetical order, on an empty data volume.
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  attendance:
    build: ./attendance-backend
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: handayani
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-default}
      PORT: "8090"
      GIN_MODE: release
    ports:
      - "8090:8090"
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: handayani
      # MUST match the Go service so FastAPI can validate its tokens.
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-default}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GO_BACKEND_URL: http://attendance:8090
      # Manager service account so the public RAG sync can pull instructors from
      # the Go service. Leave unset to omit the instructor section.
      RAG_SERVICE_USERNAME: ${RAG_SERVICE_USERNAME:-}
      RAG_SERVICE_PASSWORD: ${RAG_SERVICE_PASSWORD:-}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      attendance:
        condition: service_started

  web:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  db-data:
