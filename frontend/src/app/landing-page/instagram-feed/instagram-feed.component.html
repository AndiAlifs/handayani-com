<section class="section">
  <div class="container">
    <div class="section-header">
      <div class="hero-badge">Komunitas Kami</div>
      <h2 class="section-title">Ikuti Perjalanan <span class="accent-text">YPA Handayani</span></h2>
      <p class="section-subtitle">Lihat aktivitas terbaru, kelulusan siswa, dan tips mengemudi langsung di Instagram kami.</p>
    </div>

    <div class="ig-masonry">
      <div *ngFor="let post of posts" class="ig-masonry-item">
        <blockquote class="instagram-media" [attr.data-instgrm-permalink]="post" data-instgrm-version="14" style="background:#FFF; border:0; margin: 1px; max-width:540px; min-width:326px; padding:0; width:99.375%; width:-webkit-calc(100% - 2px); width:calc(100% - 2px);">
        </blockquote>
      </div>
    </div>

    <div class="ig-footer">
      <a href="https://www.instagram.com/ypahandayanikendari/" target="_blank" rel="noopener" class="btn-primary">
        Follow &#64;ypahandayanikendari
      </a>
    </div>
  </div>
</section>
