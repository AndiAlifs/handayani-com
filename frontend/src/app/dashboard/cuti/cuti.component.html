<section class="p-6 space-y-4 max-w-xl">
  <h1 class="text-2xl font-semibold">Permohonan Cuti</h1>

  <div class="rounded-lg border bg-white p-6">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Mulai</label>
        <input type="date" formControlName="start_date"
          class="w-full rounded border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Selesai</label>
        <input type="date" formControlName="end_date"
          class="w-full rounded border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Alasan</label>
        <textarea formControlName="reason" rows="4" placeholder="Jelaskan alasan cuti Anda..."
          class="w-full rounded border border-gray-300 px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </div>

      <button type="submit" [disabled]="form.invalid || submitting()"
        class="w-full rounded bg-blue-600 px-4 py-2.5 text-white font-semibold disabled:opacity-50 hover:bg-blue-700 transition-colors">
        @if (submitting()) {
          <span>Mengirim...</span>
        } @else {
          <span>Kirim Permohonan</span>
        }
      </button>
    </form>
  </div>

  @if (message()) {
    @if (isError()) {
      <p class="rounded bg-red-50 border-l-4 border-red-500 p-3 text-red-700 text-sm">{{ message() }}</p>
    } @else {
      <p class="rounded bg-green-50 border-l-4 border-green-500 p-3 text-green-700 text-sm">{{ message() }}</p>
    }
  }
</section>
